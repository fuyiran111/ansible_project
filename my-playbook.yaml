---
- name: config ec2 server 
  hosts: aws
  remote_user: ubuntu
  become: yes
  become_method: sudo 
  tasks: 
  - name: switch to root user
    command: whoami
  - name: install nginx 
    apt: 
      name: nginx
      state: latest
  - name: start service
    service:  
      name: nginx
      state: started

